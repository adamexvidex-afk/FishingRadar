workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic

    environment:
      xcode: 26.0
      node: latest

      ios_signing:
        certificates:
          - ios_dist
        provisioning_profiles:
          - ios_appstore_profile

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - testing_group
        submit_to_app_store: false